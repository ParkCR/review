name: Build Index

on:
  push:
    branches: [ main ]           # 监听 main 分支
    paths:
      - 'reviews/**/*.html'      # 仅当 reviews 文件夹下的 .html 文件变化时触发
  workflow_dispatch:             # 允许手动触发

permissions:
  contents: write                # 允许写入仓库

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Generate index.html and data.js
        run: python scripts/generate_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update index.html and data.js"
          git push

name: Build Index

on:
  push:
    branches: [ main ]           # 如果你使用 master，请改为 master
    paths:
      - 'reviews/**/*.html'      # 仅当 reviews 文件夹下的 .html 文件变化时触发
  workflow_dispatch:             # 允许手动触发（可选）

permissions:
  contents: write   # 显式授予写入权限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # 用于后续提交

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4   # 可选，用于更稳健的HTML解析；若只用正则可不装

      - name: Generate index.html
        run: python scripts/generate_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update index.html"
          git push
